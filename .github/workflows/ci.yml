name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Type check
        run: bundle exec rake typecheck

  test:
    name: Test (Ruby ${{ matrix.ruby-version }})
    needs: typecheck
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ruby-version: ["3.2.8", "3.3", "3.4", "4.0", "4"]
    steps:
      - uses: actions/checkout@v5

      - name: Set up Ruby ${{ matrix.ruby-version }}
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby-version }}
          bundler-cache: true

      - name: Ruby version
        run: ruby --version

      - name: Test
        run: bundle exec rake test

  package:
    name: Package
    needs: typecheck
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v5

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Read version
        id: version
        run: echo "version=$(ruby -r ./lib/zizq/version -e 'puts Zizq::VERSION')" >> "$GITHUB_OUTPUT"

      - name: Build release artifact
        run: ./release.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: zizq-ruby-package
          path: |
            target/release/zizq-*.gem
            target/release/zizq-*.gem.sha256

  integration:
    name: Integration
    needs: package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          path: client

      - name: Read client version
        id: client-version
        working-directory: client
        run: |
          version=$(ruby -r ./lib/zizq/version -e 'puts Zizq::VERSION')
          major=${version%%.*}
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "major=${major}" >> "$GITHUB_OUTPUT"

      - name: Find and download latest compatible server build
        env:
          GH_TOKEN: ${{ secrets.CROSS_REPO_TOKEN }}
        run: |
          client/.github/scripts/find-server-build.sh \
            ${{ steps.client-version.outputs.major }} \
            server

      - name: Download client artifact
        uses: actions/download-artifact@v7
        with:
          name: zizq-ruby-package
          path: artifact

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"

      - name: Run integration tests
        working-directory: client
        run: |
          ./integration/run.sh \
            --binary ${{ github.workspace }}/server/zizq \
            --gem ${{ github.workspace }}/artifact/zizq-*.gem

  # --- Gate (stable check name for branch protection) ---

  gate:
    name: Gate
    runs-on: ubuntu-latest
    needs: [test, integration]
    if: always()
    steps:
      - run: |
          if [ "${{ needs.test.result }}" != "success" ] || \
             [ "${{ needs.integration.result }}" != "success" ]; then
            echo "Required checks failed or were skipped."
            echo "  Test: ${{ needs.test.result }}"
            echo "  Integration: ${{ needs.integration.result }}"
            exit 1
          fi

  # --- Publish GitHub Release (main only, requires approval) ---

  publish:
    name: Publish Release
    needs: [gate, package]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Download package artifact
        uses: actions/download-artifact@v7
        with:
          name: zizq-ruby-package
          path: artifacts

      - name: Extract release notes from CHANGELOG
        run: |
          version=${{ needs.package.outputs.version }}
          sed -n "/^## ${version}/,/^## /p" CHANGELOG.md | head -n -1 | tail -n +2 > release-notes.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version=${{ needs.package.outputs.version }}
          gh release create "v${version}" \
            --title "v${version}" \
            --notes-file release-notes.md \
            artifacts/zizq-*

      - name: Publish to RubyGems
        env:
          GEM_HOST_API_KEY: ${{ secrets.RUBYGEMS_API_KEY }}
        run: |
          version=${{ needs.package.outputs.version }}
          gem push "./artifacts/zizq-${version}.gem"
